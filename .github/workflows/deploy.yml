name: Build & Deploy to FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASS: ${{ secrets.FTP_PASS }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
      FTP_HOST_2: ${{ secrets.FTP_HOST_2 }}
      FTP_USER_2: ${{ secrets.FTP_USER_2 }}
      FTP_PASS_2: ${{ secrets.FTP_PASS_2 }}
      FTP_REMOTE_DIR_2: ${{ secrets.FTP_REMOTE_DIR_2 }}
      FTP_PROTOCOL_1: ${{ vars.FTP_PROTOCOL_1 || 'ftps' }}
      FTP_PORT_1: ${{ vars.FTP_PORT_1 || 21 }}
      FTP_PROTOCOL_2: ${{ vars.FTP_PROTOCOL_2 || 'ftps' }}
      FTP_PORT_2: ${{ vars.FTP_PORT_2 || 21 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy via FTP (Hosting 1)
        if: ${{ env.FTP_HOST != '' && env.FTP_USER != '' && env.FTP_PASS != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_HOST }}
          username: ${{ env.FTP_USER }}
          password: ${{ env.FTP_PASS }}
          protocol: ${{ env.FTP_PROTOCOL_1 }}
          port: ${{ env.FTP_PORT_1 }}
          local-dir: ./dist/
          server-dir: ${{ env.FTP_REMOTE_DIR }}
          dangerous-clean-slate: false

      - name: Deploy via FTP (Hosting 2)
        if: ${{ env.FTP_HOST_2 != '' && env.FTP_USER_2 != '' && env.FTP_PASS_2 != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ env.FTP_HOST_2 }}
          username: ${{ env.FTP_USER_2 }}
          password: ${{ env.FTP_PASS_2 }}
          protocol: ${{ env.FTP_PROTOCOL_2 }}
          port: ${{ env.FTP_PORT_2 }}
          local-dir: ./dist/
          server-dir: ${{ env.FTP_REMOTE_DIR_2 }}
          dangerous-clean-slate: false
